services:
  postgres:
    image: postgres:16-alpine
    container_name: vetclinic_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vetclinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vetclinic}
      POSTGRES_DB: ${POSTGRES_DB:-vetclinic}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vetclinic} -d ${POSTGRES_DB:-vetclinic}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: vetclinic_api
    environment:
      DATABASE_URL: postgresql://vetclinic:vetclinic@postgres:5432/vetclinic
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: vetclinic_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@vetclinic.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
